# Render Blueprint — deploy with "New > Blueprint Instance" pointing at this repo
services:
  - type: web
    name: leadforge-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /_stcore/health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
